<div class="card">
  <p-table *ngIf="rows().length" [value]="rows()">
    <ng-template pTemplate="header">
      <tr>
        <th></th>
        <th>Date</th>
        <th>Income</th>
        <th>Expense</th>
        <th>Balance</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-row>
      <tr>
        <td></td>
        <td>{{ row.date | date: 'longDate' }}</td>
        <td>{{ row.income | currency: 'EUR':'symbol' }}</td>
        <td>{{ row.expense | currency: 'EUR':'symbol' }}</td>
        <td>{{ row.balance | currency: 'EUR':'symbol' }}</td>
      </tr>
    </ng-template>
  </p-table>
</div>
