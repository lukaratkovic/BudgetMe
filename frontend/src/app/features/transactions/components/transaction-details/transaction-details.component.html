<form [formGroup]="form" (ngSubmit)="submit()" class="p-fluid">

  <div class="grid">
    <div class="field col-6">

      <label for="typeId">Transaction type</label>
      <p-dropdown
        [options]="transactionTypes"
        optionLabel="name"
        optionValue="id"
        formControlName="typeId"
        appendTo="body">
      </p-dropdown>
    </div>

    <div class="field col-6">
      <label for="amount">Amount</label>
      <p-inputNumber
        formControlName="amount">
      </p-inputNumber>
    </div>

  </div>

  <button pButton type="submit" label="Save" class="w-auto p-button-success"></button>
  <button pButton type="button" label="Close" class="w-auto ml-1 p-button-secondary" (click)="close()"></button>

</form>
