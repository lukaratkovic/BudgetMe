<button pButton type="button" label="New" icon="pi pi-plus" class="mr-1" (click)="addNew()"></button>
<button pButton type="button" label="Import" icon="pi pi-upload" class="mr-1" (click)="import()"></button>
<div class="card">
  <p-table [value]="transactions" sortField="transactionTime" [sortOrder]="-1" [paginator]="true" [rows]="20" [tableStyle]="{'min-width': '50rem'}">
    <ng-template pTemplate="header">
      <tr>
        <th></th>
        <th pSortableColumn="type">
          Transaction type
          <p-sortIcon field="type"></p-sortIcon>
        </th>
        <th pSortableColumn="categoryIds">
          Category
          <p-sortIcon field="categoryIds"></p-sortIcon>
        </th>
        <th pSortableColumn="description">
          Description
          <p-sortIcon field="description"></p-sortIcon>
        </th>
        <th pSortableColumn="transactionTime">
          Date & Time
          <p-sortIcon field="transactionTime"></p-sortIcon>
        </th>
        <th pSortableColumn="amount">
          Amount
          <p-sortIcon field="amount"></p-sortIcon>
        </th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-transaction>
      <tr>
        <td>
          <div class="action-buttons">
            <button
              pButton
              type="button"
              icon="pi pi-pencil"
              class="p-button-text p-button-rounded p-button-sm"
              (click)="onEdit(transaction)">
            </button>
            <button
              pButton
              type="button"
              icon="pi pi-trash"
              class="p-button-text p-button-rounded p-button-sm p-button-danger"
              (click)="onDelete(transaction)">
            </button>
          </div>
        </td>
        <td>{{ transaction.type }}</td>
        <td>
          <p-tag
            *ngFor="let category of transaction.categoryNames"
            [value]="category"
            class="mr-1">
          </p-tag>
        </td>
        <td>{{ transaction.description }}</td>
        <td>{{ transaction.transactionTime | date:'EEEE, MMMM dd, y, h:mm a' }}</td>
        <td>{{ transaction.amount | number: '1.2-2' }}</td>
      </tr>
    </ng-template>
    <ng-template pTemplate="footer">
      <tr>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
        <td><b>Balance:</b></td>
        <td>{{ balance | number: '1.2-2' }}</td>
      </tr>
    </ng-template>
  </p-table>
</div>

<p-confirmDialog />
