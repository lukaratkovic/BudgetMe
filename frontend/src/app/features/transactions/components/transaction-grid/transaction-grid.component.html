<div class="card">
  <p-table [value]="transactions" [tableStyle]="{'min-width': '50rem'}">
    <ng-template pTemplate="header">
      <tr>
        <th>Transaction type</th>
        <th>Amount</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-transaction>
      <tr>
        <td>{{ transaction.type }}</td>
        <td>{{ transaction.amount }}</td>
      </tr>
    </ng-template>
  </p-table>
</div>
