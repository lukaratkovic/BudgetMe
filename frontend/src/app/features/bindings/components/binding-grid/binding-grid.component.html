<div class="card">
  <p-table [value]="bindings" [paginator]="true" [rows]="20"
           [tableStyle]="{'min-width': '50rem'}" styleClass="p-datatable-sm">
    <ng-template pTemplate="header">
      <tr>
        <th></th>
        <th pSortableColumn="keyword">
          Keyword
          <p-sortIcon field="keyword"></p-sortIcon>
        </th>
        <th pSortableColumn="transactionType">
          Transaction type
          <p-sortIcon field="transactionType"></p-sortIcon>
        </th>
        <th pSortableColumn="category">
          Category
          <p-sortIcon field="category"></p-sortIcon>
        </th>
      </tr>
      <tr class="header-filter-row">
        <th>
          <div class="action-buttons">
            <button pButton pTooltip="New" type="button" icon="pi pi-plus" class="mr-1 p-button-sm p-button-rounded p-button-text" (click)="addNew()"></button>
          </div>
        </th>
        <th>
          <p-columnFilter field="keyword" matchMode="contains" display="row">
            <ng-template pTemplate="filter" let-value let-filter="filterCallback">
              <input
                pInputText
                type="text"
                [value]="value"
                (input)="filter($any($event.target).value)" />
            </ng-template>
          </p-columnFilter>
        </th>
        <th>
          <p-columnFilter field="transactionType" matchMode="equals" display="row">
            <ng-template pTemplate="filter" let-value let-filter="filterCallback">
              <p-dropdown
                [options]="transactionTypes"
                optionLabel="name"
                optionValue="name"
                [showClear]="true"
                (onChange)="filter($event.value)"
                appendTo="body">
              </p-dropdown>
            </ng-template>
          </p-columnFilter>
        </th>
        <th>
          <p-columnFilter field="category" matchMode="equals" display="row">
            <ng-template pTemplate="filter" let-value let-filter="filterCallback">
              <p-dropdown
                [options]="categories"
                optionLabel="name"
                optionValue="name"
                [showClear]="true"
                (onChange)="filter($event.value)"
                appendTo="body">
              </p-dropdown>
            </ng-template>
          </p-columnFilter>
        </th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-binding>
      <tr>
        <td>
          <button
            pButton
            type="button"
            icon="pi pi-pencil"
            class="p-button-text p-button-rounded p-button-sm"
            (click)="onEdit(binding)">
          </button>
          <button
            pButton
            type="button"
            icon="pi pi-trash"
            class="p-button-text p-button-danger p-button-sm p-button-rounded"
            (click)="onDelete(binding)">
          </button>
        </td>
        <td>{{ binding.keyword }}</td>
        <td>{{ binding.transactionType }}</td>
        <td>{{ binding.category }}</td>
      </tr>
    </ng-template>
  </p-table>
</div>
<p-confirmDialog />
