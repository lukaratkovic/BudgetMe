<div class="card">
  <p-table [value]="categories" sortField="transactionType" [paginator]="true" [rows]="10"
           [tableStyle]="{'min-width': '50rem'}" styleClass="p-datatable-sm">
    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="isSystem">
          <p-sortIcon field="isSystem"></p-sortIcon>
        </th>
        <th pSortableColumn="name">
          Name
          <p-sortIcon field="name"></p-sortIcon>
        </th>
        <th pSortableColumn="description">
          Description
          <p-sortIcon field="description"></p-sortIcon>
        </th>
        <th pSortableColumn="transactionType">
          Transaction type
          <p-sortIcon field="transactionType"></p-sortIcon>
        </th>
      </tr>
      <tr class="header-filter-row">
        <th>
          <div class="action-buttons">
            <button pButton pTooltip="New" type="button" icon="pi pi-plus" class="mr-1 p-button-sm p-button-roudned p-button-text" (click)="addNew()"></button>
          </div>
        </th>
        <th>
          <p-columnFilter field="name" matchMode="contains" display="row">
            <ng-template pTemplate="filter" let-value let-filter="filterCallback">
              <input
                pInputText
                type="text"
                [value]="value"
                (input)="filter($any($event.target).value)" />
            </ng-template>
          </p-columnFilter>
        </th>
        <th>
          <p-columnFilter field="description" matchMode="contains" display="row">
            <ng-template pTemplate="filter" let-value let-filter="filterCallback">
              <input
                pInputText
                type="text"
                [value]="value"
                (input)="filter($any($event.target).value)" />
            </ng-template>
          </p-columnFilter>
        </th>
        <th>
          <p-columnFilter field="transactionType" matchMode="equals" display="row">
            <ng-template pTemplate="filter" let-value let-filter="filterCallback">
              <p-dropdown
                [options]="transactionTypes"
                optionLabel="name"
                optionValue="name"
                [showClear]="true"
                (onChange)="filter($event.value)"
                appendTo="body">
              </p-dropdown>
            </ng-template>
          </p-columnFilter>
        </th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-category>
      <tr>
        <td>
          <button
            *ngIf="!category.isSystem"
            pButton
            type="button"
            icon="pi pi-pencil"
            class="p-button-text p-button-rounded p-button-sm"
            (click)="onEdit(category)">
          </button>
          <button
            *ngIf="!category.isSystem"
            pButton
            type="button"
            icon="pi pi-trash"
            class="p-button-text p-button-rounded p-button-sm p-button-danger"
            (click)="onDelete(category)"></button>
        </td>
        <td>{{ category.name }}</td>
        <td>{{ category.description }}</td>
        <td>{{ category.transactionType }}</td>
      </tr>
    </ng-template>
  </p-table>
</div>

<p-confirmDialog />
