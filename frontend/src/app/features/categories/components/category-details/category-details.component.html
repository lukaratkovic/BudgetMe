<form [formGroup]="form" (ngSubmit)="submit()" class="p-fluid">

  <div class="grid">
    <div class="field col-12">
      <label for="name">Name</label>
      <input
        id="name"
        type="text"
        pInputText
        formControlName="name"/>
    </div>

    <div class="field col-12">
      <label for="description">Description</label>
      <textarea rows="3" cols="30" pInputTextarea formControlName="description"></textarea>
    </div>

    <div class="field col-12">
      <label for="transactionTypeId">Transaction type</label>
      <p-dropdown
        [options]="transactionTypes"
        optionLabel="name"
        optionValue="id"
        formControlName="transactionTypeId"
        appendTo="body">
      </p-dropdown>
    </div>
  </div>

  <button pButton type="submit" label="Save" class="w-auto p-button-success"></button>
  <button pButton type="button" label="Close" class="w-auto ml-1 p-button-secondary" (click)="close()"></button>

</form>
